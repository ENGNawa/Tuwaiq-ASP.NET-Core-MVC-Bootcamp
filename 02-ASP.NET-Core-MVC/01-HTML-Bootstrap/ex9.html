<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f8f5ff;
        }

        .custom-navbar {
            background: linear-gradient(90deg, #8e44ad, #c77dff);
        }

        .logo {
            width: 75px;
            height: 75px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid white;
        }

        .academy {
            color: white;
            font-size: 20px;
            font-weight: 600;
        }

        .course {
            color: white;
            font-size: 18px;
            font-weight: 500;
        }

        .icon {
            color: white;
            font-size: 22px;
            transition: .3s;
        }

        .icon:hover {
            color: #f3e8ff;
        }
    </style>

</head>

<body>

    <nav class="navbar custom-navbar shadow-sm py-2">

        <div class="container">

            <div class="d-flex align-items-center gap-4">

                <span class="academy">
                    أكاديمية طويق
                </span>

                <a href="#" class="icon">
                    <i class="bi bi-linkedin"></i>
                </a>

                <a href="#" class="icon">
                    <i class="bi bi-github"></i>
                </a>

            </div>

            <div class="text-center">
                <h5 class="course mb-0">
                    كورس ASP.NET Core MVC
                </h5>
            </div>

            <img src="ttt.png" class="logo">

        </div>

    </nav>

</body>

</html>
