<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASP.NET Core MVC</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .custom-card {
            min-height: 500px;
            border-radius: 35px;
            background: linear-gradient(135deg, #d8c4ff, #b197fc);
            color: white;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(177, 151, 252, 0.4);
            transition: 0.3s;
        }

        .custom-card:hover {
            transform: translateY(-10px);
        }

        .middle-card {
            background: linear-gradient(135deg, #b197fc, #712cf9);
        }

        .custom-card h2 {
            font-size: 42px;
            font-weight: 800;
        }

        .custom-card p {
            font-size: 20px;
            margin-top: 20px;
            color: #f5f5f5;
        }

        .custom-btn {
            background-color: white;
            color: #712cf9;
            font-weight: bold;
            border-radius: 30px;
            padding: 12px 25px;
            border: none;
            width: 100%;
        }

        .custom-btn:hover {
            background-color: #f3e8ff;
        }

        .card-image {
            width: 180px;
            margin: auto;
            display: block;
        }
    </style>

</head>

<body>

    <div class="container py-5">

        <div class="row g-4">

            <!-- Card 1 -->
            <div class="col-md-4">

                <div class="custom-card d-flex flex-column justify-content-between text-center">

                    <div>

                        <h2>Tuwaiq Academy</h2>

                        <p>
                            Empowering skills,<br>
                            building the future
                        </p>

                    </div>

                    <button class="custom-btn">
                        Go To Tuwaiq
                    </button>

                </div>

            </div>

            <!-- Card 2 -->
            <div class="col-md-4">

                <div class="custom-card middle-card d-flex flex-column justify-content-between text-center">

                    <div>

                        <h2>
                            ASP.NET <br>
                            Core MVC
                        </h2>

                        <p>
                            Build modern web applications
                            using ASP.NET Core MVC
                        </p>

                    </div>

                    <button class="custom-btn">
                        Learn ASP.NET
                    </button>

                </div>

            </div>

            <!-- Card 3 -->
            <div class="col-md-4">

                <div class="custom-card d-flex flex-column justify-content-between text-center">

                    <div>

                        <img src="ttt.png" alt="Graduation Cap" class="card-image img-fluid">

                        <h2 class="mt-4">
                            Learn More
                        </h2>

                        <p>
                            Explore tutorials and
                            enhance your skills
                        </p>

                    </div>

                    <button class="custom-btn">
                        Learn More
                    </button>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
