<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات الموظفين</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header text-center text-dark" style="background-color:#BDEBFF;">
                <h3>بيانات الموظفين</h3>
            </div>

            <div class="card-body">

                <form>

                    <div class="row g-3">

                        <div class="col">
                            <label class="form-label">رقم الموظف</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col">
                            <label class="form-label">اسم الموظف</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col">
                            <label class="form-label">الوظيفة</label>

                            <select class="form-select">
                                <option selected>اختر الوظيفة</option>
                                <option>مطور ويب</option>
                                <option>محاسب</option>
                                <option>مدير</option>
                                <option>موظف إداري</option>
                            </select>
                        </div>

                        <div class="col">
                            <label class="form-label">الراتب</label>
                            <input type="number" class="form-control">
                        </div>

                    </div>

                    <div class="row g-3 mt-2">

                        <div class="col">
                            <label class="form-label">رقم الهاتف</label>

                            <div class="input-group">
                                <span class="input-group-text">+966</span>
                                <input type="text" class="form-control">
                            </div>
                        </div>

                        <div class="col">
                            <label class="form-label">العنوان</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control">
                        </div>

                    </div>

                    <div class="row g-3 mt-2">

                        <div class="col">
                            <label class="form-label">القسم</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col">
                            <label class="form-label">الفرع</label>
                            <input type="text" class="form-control">
                        </div>

                    </div>

                    <hr>



                    <label class="form-label fw-bold">حالة الموظف</label>

                    <div class="form-check d-flex align-items-center gap-2">
                        <input class="form-check-input m-0" type="radio" name="status" id="contract">
                        <label class="form-check-label" for="contract">متعاقد</label>
                    </div>

                    <div class="form-check d-flex align-items-center gap-2">
                        <input class="form-check-input m-0" type="radio" name="status" id="training">
                        <label class="form-check-label" for="training">تحت التدريب</label>
                    </div>

                    <div class="form-check d-flex align-items-center gap-2">
                        <input class="form-check-input m-0" type="radio" name="status" id="working">
                        <label class="form-check-label" for="working">على رأس العمل</label>
                    </div>
                    <div class="text-center mt-4">

                        <button type="submit" class="btn text-dark px-5" style="background-color:#BDEBFF;">
                            حفظ البيانات
                        </button>


                    </div>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
