<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Header</title>

    <style>
        body {
            background: #f7f7f7;
        }

        .header {
            min-height: 500px;
            background: linear-gradient(135deg, #9d4edd, #986c95);
        }

        .title {
            color: white;
            font-size: 50px;
            font-weight: bold;
        }

        .number {
            color: #f3e8ff;
            font-size: 25px;
        }

        .photo {
            border-radius: 25px;
        }
    </style>

</head>

<body>

    <div class="header d-flex align-items-center">

        <div class="container">

            <div class="row align-items-center">

                <div class="col-md-6">

                    <h1 class="title">
                        أكاديمية طويق
                    </h1>

                    <h3 class="text-white mt-4">
                        كورس ASP.NET Core MVC
                    </h3>



                    <button class="btn btn-light btn-lg mt-3">
                        ابدأ التعلم
                    </button>

                </div>

                <div class="col-md-6 text-center">

                    <img src="ttt.png" class="img-fluid photo shadow" width="400">

                </div>

            </div>

        </div>

    </div>

</body>

</html>
